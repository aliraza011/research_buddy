<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Research Buddy Settings</title>
    <link rel="stylesheet" href="styles/options.css" />
  </head>
  <body>
    <main>
      <h1>Research Buddy Settings</h1>
      <form id="settings-form">
        <label>
          Research profile / context
          <textarea id="profileText" rows="4" placeholder="Describe your research focus…"></textarea>
        </label>
        <label>
          Keywords (comma separated)
          <input id="keywords" type="text" placeholder="multi-agent, search, LLM planning" />
        </label>
        <label>
          Scan interval (minutes, minimum 15)
          <input id="scanIntervalMinutes" type="number" min="15" step="5" value="60" />
        </label>
        <label>
          Max summaries to keep
          <input id="maxSummaries" type="number" min="1" max="20" value="5" />
        </label>
        <label>
          LLM base URL
          <input id="llmBaseUrl" type="url" placeholder="http://localhost:11434/v1" />
        </label>
        <label>
          LLM model
          <input id="llmModel" type="text" placeholder="gpt-4o-mini" />
        </label>
        <label>
          LLM API key
          <input id="llmApiKey" type="password" placeholder="sk-local..." />
        </label>
        <fieldset class="scholar-block">
          <legend>Google Scholar Matching</legend>
          <label>
            Scholar profile URL
            <input
              id="scholarProfileUrl"
              type="url"
              placeholder="https://scholar.google.com/citations?user=XXXX"
            />
          </label>
          <label class="checkbox-row">
            <input id="matchScholar" type="checkbox" />
            <span>Highlight papers that match my Google Scholar publications</span>
          </label>
          <div class="actions tight">
            <button id="refreshScholar" type="button">Refresh Scholar data</button>
            <span id="scholar-status"></span>
          </div>
          <div id="scholar-preview" class="scholar-preview">
            No Scholar data cached yet.
          </div>
        </fieldset>
        <div class="actions">
          <button id="save" type="submit">Save</button>
          <span id="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js" type="module"></script>
  </body>
</html>
